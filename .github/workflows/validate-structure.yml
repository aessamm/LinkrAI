name: Validate repository structure

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Sprint 0 structure
        run: npm run validate:structure
